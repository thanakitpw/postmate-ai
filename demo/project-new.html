<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostMate AI — สร้างโปรเจคใหม่</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><div class="logo-icon">PM</div><h1>PostMate AI</h1></div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">เมนูหลัก</div>
        <a href="index.html" class="sidebar-link"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>หน้าหลัก</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">ลูกค้า</div>
        <a href="client-detail.html" class="sidebar-link active"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>ร้านอาหาร ABC</a>
      </div>
      <div style="margin-top:auto;padding:1rem 0.75rem;border-top:1px solid rgba(255,255,255,0.08)">
        <a href="login.html" class="sidebar-link" style="color:#f87171"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>ออกจากระบบ</a>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" onclick="toggleSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
          <div class="topbar-breadcrumb">
            <a href="index.html">หน้าหลัก</a> <span>/</span>
            <a href="client-detail.html">ร้านอาหาร ABC</a> <span>/</span>
            <span class="current">สร้างโปรเจคใหม่</span>
          </div>
        </div>
        <div class="topbar-right"><div class="topbar-avatar">A</div></div>
      </header>

      <div class="page-content" style="max-width:720px">
        <div class="page-header">
          <div>
            <h2 class="page-title">สร้างโปรเจคใหม่</h2>
            <p class="page-subtitle">สำหรับ ร้านอาหาร ABC — 1 โปรเจค = 1 Page/Account</p>
          </div>
        </div>

        <form onsubmit="event.preventDefault(); showToast('สร้างโปรเจคเรียบร้อย!'); setTimeout(() => window.location.href='calendar.html', 1000)">
          <!-- Step 1: Platform -->
          <div class="card" style="margin-bottom:1rem">
            <h3 style="font-size:1rem;font-weight:600;margin-bottom:1rem">1. เลือก Platform</h3>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem">
              <label style="cursor:pointer">
                <input type="radio" name="platform" value="facebook" required style="display:none" checked>
                <div style="border:2px solid var(--primary);border-radius:12px;padding:1.25rem;text-align:center;background:var(--primary-light)">
                  <div style="font-size:2rem;margin-bottom:0.5rem"><svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></div>
                  <div style="font-weight:600;color:var(--primary)">Facebook</div>
                  <div style="font-size:0.75rem;color:var(--text-muted)">Business Page</div>
                </div>
              </label>
              <label style="cursor:pointer">
                <input type="radio" name="platform" value="instagram" style="display:none">
                <div style="border:2px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center;transition:border-color 0.15s">
                  <div style="font-size:2rem;margin-bottom:0.5rem"><svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></div>
                  <div style="font-weight:600">Instagram</div>
                  <div style="font-size:0.75rem;color:var(--text-muted)">Business Account</div>
                </div>
              </label>
              <label style="cursor:pointer">
                <input type="radio" name="platform" value="tiktok" style="display:none">
                <div style="border:2px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center;transition:border-color 0.15s">
                  <div style="font-size:2rem;margin-bottom:0.5rem"><svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 0010.86 4.46V13.2a8.16 8.16 0 005.58 2.19V12a4.85 4.85 0 01-5.58-2.19V6.69h5.58z"/></svg></div>
                  <div style="font-weight:600">TikTok</div>
                  <div style="font-size:0.75rem;color:var(--text-muted)">Account</div>
                </div>
              </label>
            </div>
          </div>

          <!-- Step 2: Brand Profile -->
          <div class="card" style="margin-bottom:1rem">
            <h3 style="font-size:1rem;font-weight:600;margin-bottom:1rem">2. Brand Profile</h3>
            <div class="form-group">
              <label class="form-label">ชื่อโปรเจค *</label>
              <input type="text" class="form-input" placeholder="เช่น ABC สาขาสยาม — Facebook" required>
            </div>
            <div class="form-group">
              <label class="form-label">ชื่อเพจ / Account *</label>
              <input type="text" class="form-input" placeholder="ชื่อเพจจริงบน platform">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
              <div class="form-group">
                <label class="form-label">ประเภทธุรกิจ</label>
                <input type="text" class="form-input" placeholder="เช่น ร้านอาหาร, คลินิก">
              </div>
              <div class="form-group">
                <label class="form-label">กลุ่มเป้าหมาย</label>
                <input type="text" class="form-input" placeholder="เช่น วัยทำงาน 25-35 ปี">
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
              <div class="form-group">
                <label class="form-label">โทน (Tone)</label>
                <select class="form-select">
                  <option>Professional</option>
                  <option selected>Friendly</option>
                  <option>Humorous</option>
                  <option>Inspirational</option>
                  <option>Urgent</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">ภาษา</label>
                <select class="form-select">
                  <option selected>TH (ภาษาไทย)</option>
                  <option>EN (English)</option>
                  <option>Both (ไทย + English)</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Brand Voice Notes</label>
              <textarea class="form-textarea" placeholder="อธิบายบุคลิกของแบรนด์เพิ่มเติม เช่น ใช้ภาษาสุภาพ เน้นความอบอุ่น ใส่อีโมจิบ้าง"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">URL เว็บไซต์</label>
              <input type="url" class="form-input" placeholder="https://www.abc-restaurant.com">
              <p style="font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem">สำหรับ content type "แชร์บทความ"</p>
            </div>
          </div>

          <div style="display:flex;gap:0.75rem">
            <button type="submit" class="btn btn-primary btn-lg">สร้างโปรเจค</button>
            <a href="client-detail.html" class="btn btn-secondary btn-lg">ยกเลิก</a>
          </div>
        </form>
      </div>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
