<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostMate AI — ลืมรหัสผ่าน</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">PM</div>
        <h1>ลืมรหัสผ่าน</h1>
        <p>กรอกอีเมลเพื่อรับลิงก์รีเซ็ตรหัสผ่าน</p>
      </div>

      <form onsubmit="event.preventDefault(); document.getElementById('successMsg').style.display='block'; this.style.display='none'">
        <div class="form-group">
          <label class="form-label">อีเมล</label>
          <input type="email" class="form-input" placeholder="you@company.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">ส่งลิงก์รีเซ็ต</button>
      </form>

      <div id="successMsg" style="display:none;text-align:center;padding:1.5rem;background:#f0fdf4;border-radius:12px;border:1px solid #bbf7d0">
        <div style="font-size:2rem;margin-bottom:0.5rem">&#9993;</div>
        <h3 style="color:#166534;margin-bottom:0.5rem">ส่งอีเมลเรียบร้อย!</h3>
        <p style="font-size:0.85rem;color:#15803d">กรุณาตรวจสอบอีเมลของคุณ แล้วคลิกลิงก์เพื่อรีเซ็ตรหัสผ่าน</p>
      </div>

      <div style="text-align:center;margin-top:1.5rem">
        <a href="login.html" style="font-size:0.85rem;color:var(--primary);text-decoration:none">&larr; กลับไปหน้าเข้าสู่ระบบ</a>
      </div>
    </div>
  </div>
</body>
</html>
