<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostMate AI — เข้าสู่ระบบ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">PM</div>
        <h1>PostMate AI</h1>
        <p>จัดการ Social Media อัจฉริยะ</p>
      </div>

      <form onsubmit="event.preventDefault(); window.location.href='index.html'">
        <div class="form-group">
          <label class="form-label">อีเมล</label>
          <input type="email" class="form-input" placeholder="you@company.com" value="admin@bestsolutions.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">รหัสผ่าน</label>
          <input type="password" class="form-input" placeholder="รหัสผ่าน" value="password123" required>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
          <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;color:var(--text-muted);cursor:pointer">
            <input type="checkbox" checked style="accent-color:var(--primary)"> จดจำฉัน
          </label>
          <a href="forgot-password.html" style="font-size:0.85rem;color:var(--primary);text-decoration:none">ลืมรหัสผ่าน?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">เข้าสู่ระบบ</button>
      </form>

      <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)">
        <p style="font-size:0.85rem;color:var(--text-muted)">ยังไม่มีบัญชี? <a href="#" style="color:var(--primary);text-decoration:none;font-weight:500">ติดต่อเรา</a></p>
      </div>
    </div>
  </div>
</body>
</html>
